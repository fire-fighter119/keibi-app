<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="警備チェック">
  <meta name="theme-color" content="#070B13">
  <title>警備チェック</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#070B13;--surface:#142033;--surface2:#1F3150;--surface3:#2D4268;
      --border:#5B6F91;--soft-border:rgba(255,255,255,.18);
      --text:#FFFFFF;--text2:#D9E6F7;--muted:#AFC0D4;
      --accent:#28B779;--accent2:#F4C76A;--green:#37D67A;--quest:#24386A;
      --orange:#FFD166;--red:#FF6B5E;--radius:14px;--shadow:0 14px 34px rgba(0,0,0,.36);
    }
    html,body{width:100%;max-width:100%;overflow-x:hidden;}
    body{background:radial-gradient(circle at 50% -20%,rgba(62,115,210,.28),transparent 36%),linear-gradient(180deg,#101B2D 0%,#070B13 58%,#04070D 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:100vh;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px);}

    /* HEADER */
    .hdr{position:sticky;top:0;z-index:100;background:rgba(7,11,19,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px 8px;padding-top:calc(env(safe-area-inset-top,0px) + 10px);border-bottom:1px solid rgba(255,255,255,.2);display:flex;align-items:center;gap:6px;box-shadow:0 8px 24px rgba(0,0,0,.34);max-width:100%;overflow:hidden;}
    .hdr-title{font-size:15px;font-weight:900;flex:1 1 auto;min-width:0;letter-spacing:0;color:#FFE8A6;text-shadow:0 1px 0 rgba(0,0,0,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hdr-date{font-size:11px;color:var(--text2);flex-shrink:0;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:4px 7px;border-radius:999px;}
    .hdr-space{display:none;}
    .hdr-btn{background:var(--surface2);border:1px solid var(--soft-border);color:var(--text);font-size:10.5px;font-weight:800;padding:7px 8px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.08);}
    .hdr-btn.orange{color:#FFE1A6;border-color:rgba(242,169,59,.35);background:rgba(242,169,59,.11);}
    .hdr-btn.start{color:#F7F3EA;border-color:rgba(214,168,79,.55);background:linear-gradient(135deg,rgba(36,56,106,.82),rgba(91,70,29,.72));box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 8px 18px rgba(0,0,0,.18);}
    .hdr-btn.edit-on{background:var(--green);border-color:var(--green);color:#fff;}

    /* MAIN */
    .main{padding:10px;display:flex;flex-direction:column;gap:10px;max-width:620px;width:100%;margin:0 auto;overflow-x:hidden;}

    /* OVERVIEW */
    .overview{border:2px solid rgba(244,199,106,.5);background:linear-gradient(135deg,rgba(31,49,80,.98),rgba(25,37,58,.98));border-radius:8px;padding:14px;box-shadow:var(--shadow),inset 0 0 0 1px rgba(255,255,255,.1);}
    .overview.complete{position:relative;overflow:hidden;min-height:190px;border-color:rgba(240,190,88,.82);background:radial-gradient(circle at 78% 10%,rgba(255,238,176,.28),transparent 26%),linear-gradient(135deg,rgba(214,168,79,.32),rgba(117,80,23,.22),rgba(27,29,24,.94));box-shadow:0 0 0 1px rgba(240,190,88,.24),0 22px 54px rgba(214,168,79,.22),var(--shadow);}
    .overview.complete::before{content:'';position:absolute;inset:-40%;background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.22) 46%,transparent 57%);transform:rotate(8deg);pointer-events:none;}
    .overview.complete::after{content:'MISSION\A COMPLETE';white-space:pre;position:absolute;left:50%;top:52%;transform:translate(-50%,-50%) rotate(-7deg);width:calc(100% - 30px);max-width:410px;padding:16px 12px;border:5px double rgba(255,224,150,.9);border-radius:18px;color:#FFE08A;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.2),transparent 28%),repeating-linear-gradient(-18deg,rgba(255,224,150,.16) 0 2px,rgba(255,224,150,.03) 2px 6px),rgba(76,48,10,.2);font-size:clamp(30px,9vw,52px);font-weight:950;letter-spacing:1px;line-height:.92;text-align:center;box-shadow:inset 0 0 0 2px rgba(255,224,150,.22),0 18px 36px rgba(0,0,0,.32),0 0 42px rgba(214,168,79,.18);pointer-events:none;text-shadow:1px 1px 0 rgba(92,49,0,.36),0 0 18px rgba(255,224,150,.26);z-index:1;}
    .overview-complete-badge{display:none;margin-top:10px;padding:10px 12px;border-radius:12px;background:rgba(214,168,79,.14);border:1px solid rgba(240,190,88,.3);color:#FFE8A6;font-size:13px;font-weight:850;line-height:1.45;}
    .overview.complete .overview-complete-badge{display:block;}
    .overview.complete .overview-top,.overview.complete .overview-stats{position:relative;z-index:2;}
    .overview-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
    .overview-kicker{font-size:11px;color:#E9CB85;font-weight:800;letter-spacing:0;}
    .overview-title{font-size:20px;font-weight:850;line-height:1.25;margin-top:2px;}
    .overview-sub{font-size:12px;color:#EAF2FF;line-height:1.5;margin-top:5px;}
    .overview-ring{width:62px;height:62px;border-radius:50%;background:conic-gradient(var(--accent) var(--pct),rgba(255,255,255,.11) 0);display:grid;place-items:center;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);}
    .overview-ring span{width:48px;height:48px;border-radius:50%;background:var(--surface);display:grid;place-items:center;font-size:14px;font-weight:850;color:#EAF8EF;}
    .overview-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
    .stat{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);border-radius:12px;padding:9px 8px;}
    .stat-label{font-size:10px;color:#C9D7EA;font-weight:800;}
    .stat-value{font-size:15px;font-weight:850;margin-top:3px;}

    /* CARD */
    .card{background:#05080F;border-radius:10px;overflow:hidden;border:2px solid rgba(255,107,94,.42);transition:border-color .2s,transform .2s,background .2s;box-shadow:0 12px 28px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.07),inset 0 0 0 1px rgba(255,255,255,.04);}
    .card.complete{position:relative;border-color:rgba(34,197,94,.82);background:linear-gradient(135deg,rgba(23,55,33,.98),rgba(27,29,24,.96));box-shadow:0 0 0 1px rgba(34,197,94,.18),0 14px 34px rgba(34,197,94,.12),0 8px 22px rgba(0,0,0,.2);}
    .card.complete::before{content:'';position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,#22C55E,#A3E635,#22C55E);}
    .card.complete::after{content:'完了';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-11deg);padding:11px 26px;border:4px double rgba(55,214,122,.9);border-radius:12px;color:#7CFFAE;background:radial-gradient(circle at 25% 25%,rgba(255,255,255,.12),transparent 30%),repeating-linear-gradient(-18deg,rgba(55,214,122,.16) 0 2px,rgba(55,214,122,.035) 2px 5px),rgba(5,45,22,.28);font-size:32px;font-weight:950;letter-spacing:5px;line-height:1;box-shadow:0 0 0 1px rgba(55,214,122,.2),inset 0 0 0 2px rgba(55,214,122,.18),0 10px 24px rgba(0,0,0,.22),0 0 28px rgba(55,214,122,.16);opacity:.94;pointer-events:none;z-index:2;text-shadow:1px 1px 0 rgba(0,70,25,.24),0 0 14px rgba(124,255,174,.2);mix-blend-mode:screen;}
    .card.complete .card-icon{background:rgba(34,197,94,.18);box-shadow:inset 0 0 0 1px rgba(34,197,94,.22);}
    .card.complete .card-title{color:#E9FFE9;}
    .card.expanded{border-color:rgba(255,107,94,.76);box-shadow:0 14px 32px rgba(0,0,0,.42),0 0 0 1px rgba(255,107,94,.18),inset 5px 0 0 rgba(255,107,94,.88);}
    .card-hdr{display:flex;align-items:center;padding:15px 15px;gap:11px;cursor:pointer;user-select:none;-webkit-user-select:none;background:radial-gradient(circle at 100% 0%,rgba(255,209,102,.2),transparent 28%),linear-gradient(180deg,#4A1E28,#2A1420);border-bottom:2px solid rgba(255,107,94,.48);}
    .card-icon{font-size:20px;width:34px;height:34px;border-radius:8px;background:linear-gradient(145deg,#6B2B35,#351521);border:1px solid rgba(255,177,168,.56);display:flex;align-items:center;justify-content:center;text-align:center;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 6px 14px rgba(0,0,0,.24);}
    .card-info{flex:1;min-width:0;}
    .card-title{font-size:15px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0;color:#FFF4F1;}
    .card-time{font-size:12px;color:#FFD2CC;margin-top:3px;white-space:normal;line-height:1.35;overflow-wrap:anywhere;}
    .card-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .card-prog{font-size:12px;color:#EAF2FF;min-width:40px;text-align:center;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:4px 7px;font-weight:900;}
    .card-prog.done{color:var(--green);}
    .chevron{color:var(--text2);font-size:13px;transition:transform .25s;}
    .chevron.open{transform:rotate(180deg);}
    .alarm-pill{display:inline-flex;align-items:center;justify-content:center;gap:3px;width:74px;min-height:30px;border-radius:999px;border:1px solid rgba(255,107,94,.56);background:rgba(255,107,94,.13);color:#FFD2CC;font-size:11px;font-weight:950;line-height:1;cursor:pointer;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.08);}
    .alarm-pill.set{border-color:#FF6B5E;background:#FF6B5E;color:#1B0706;box-shadow:0 0 0 3px rgba(255,107,94,.2),0 6px 16px rgba(255,107,94,.18);}
    .alarm-pill span{font-variant-numeric:tabular-nums;}

    /* PROGRESS BAR */
    .pbar-wrap{height:4px;background:rgba(255,255,255,.18);}
    .pbar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .35s;}
    .pbar.done{background:var(--green);}

    /* BODY */
    .card-body{display:none;padding:0 16px 16px;background:#060B14;border-top:1px solid rgba(255,255,255,.08);box-shadow:inset 0 14px 24px rgba(0,0,0,.34);}
    .card-body.open{display:block;}

    /* PATTERN TABS */
    .tabs{display:flex;gap:6px;margin-top:12px;margin-bottom:12px;}
    .tab{flex:1;padding:10px;border-radius:12px;border:1px solid var(--soft-border);background:rgba(255,255,255,.1);color:#EAF2FF;font-size:13px;font-weight:800;cursor:pointer;text-align:center;transition:all .15s;}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

    /* SUBSECTION */
    .sub{margin-bottom:10px;}
    .sub.priority-urgent .sub-title{color:#FFB1A8;border-color:rgba(239,91,75,.34);background:rgba(239,91,75,.09);}
    .sub.priority-docs .sub-title{color:#BFD8FF;border-color:rgba(59,130,246,.32);background:rgba(59,130,246,.1);}
    .sub.priority-report .sub-title{color:#FFE0A3;border-color:rgba(214,168,79,.36);background:rgba(214,168,79,.11);}
    .sub.stamp-complete{position:relative;border-radius:14px;background:rgba(34,197,94,.045);box-shadow:inset 0 0 0 1px rgba(34,197,94,.14);padding:8px 8px 2px;}
    .sub.stamp-complete::after{content:'完了';position:absolute;right:18px;top:50%;transform:translateY(-50%) rotate(-10deg);padding:8px 18px;border:3px double rgba(55,214,122,.9);border-radius:10px;color:#7CFFAE;background:rgba(5,45,22,.24);font-size:24px;font-weight:950;letter-spacing:4px;line-height:1;pointer-events:none;opacity:.9;box-shadow:0 8px 18px rgba(0,0,0,.18),0 0 22px rgba(55,214,122,.12);text-shadow:1px 1px 0 rgba(0,70,25,.18);z-index:1;}
    .sub-title{display:flex;align-items:center;gap:8px;font-size:14.5px;font-weight:950;color:#FFF1B8;letter-spacing:0;margin:18px 0 12px;padding:12px 13px;border:1px solid rgba(244,199,106,.58);border-left:6px solid var(--accent2);border-radius:10px;background:linear-gradient(90deg,rgba(244,199,106,.24),rgba(36,56,106,.2));box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 8px 18px rgba(0,0,0,.16);}
    .sub-title::before{content:'◆';font-size:10px;color:var(--accent2);line-height:1;flex-shrink:0;}
    .sub-help{margin:8px 0 10px;padding:9px 11px;border-radius:9px;background:rgba(244,199,106,.08);border:1px solid rgba(244,199,106,.2);color:#FFE3A3;font-size:11.5px;line-height:1.65;white-space:pre-line;overflow-wrap:anywhere;}

    /* ITEM */
    .item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.14);cursor:pointer;border-radius:10px;transition:background .15s,box-shadow .15s;}
    .item:active{background:rgba(255,255,255,.06);box-shadow:0 0 0 1px rgba(255,255,255,.08);}
    .item.dragging{opacity:.45;background:rgba(214,168,79,.09);border-radius:10px;}
    .drag-handle{order:1;width:26px;height:26px;border-radius:7px;border:1px solid rgba(214,168,79,.32);background:rgba(214,168,79,.11);color:#FFE0A3;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;line-height:1;cursor:grab;touch-action:none;flex-shrink:0;margin-top:0;}
    .drag-handle:active{cursor:grabbing;background:rgba(214,168,79,.2);}
    .item:last-of-type{border-bottom:none;}
    .cb{order:3;width:30px;height:30px;border-radius:9px;border:2px solid #B6C7DD;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:0;background:rgba(255,255,255,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 5px 12px rgba(0,0,0,.16);}
    .cb.chk{background:linear-gradient(145deg,var(--accent),#1F9D66);border-color:#51D89B;box-shadow:0 0 0 3px rgba(40,183,121,.14),inset 0 1px 0 rgba(255,255,255,.18);}
    .cb.chk::after{content:'✓';color:#fff;font-size:14px;font-weight:700;}
    .item-main{order:2;flex:1;min-width:0;}
    .item-label{font-size:14.5px;line-height:1.55;transition:color .15s;overflow-wrap:anywhere;word-break:break-word;}
    .item-label.chk{color:#B9C8DB;text-decoration:line-through;}
    .item-hint{font-size:12px;color:#FFE08A;padding-top:5px;padding-left:2px;line-height:1.55;}
    .steps{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
    .step{display:inline-flex;align-items:center;gap:4px;max-width:100%;color:#F3BF62;background:rgba(242,169,59,.09);border:1px solid rgba(242,169,59,.18);border-radius:999px;padding:4px 7px;font-size:11px;line-height:1.2;white-space:normal;overflow-wrap:anywhere;}
    .step-num{width:15px;height:15px;border-radius:50%;background:rgba(242,169,59,.2);color:#FFD99B;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0;}
    .item-note-btn{background:none;border:none;color:var(--text2);font-size:16px;padding:4px;cursor:pointer;flex-shrink:0;opacity:.6;margin-top:-2px;}
    .item-note-btn.has-note{opacity:1;color:var(--orange);}
    .item-del{order:4;background:none;border:none;color:var(--red);font-size:20px;padding:4px;cursor:pointer;flex-shrink:0;opacity:.7;margin-top:-3px;line-height:1;}

    /* NOTICE ITEM */
    .item-notice{background:rgba(255,209,102,.14);border:1px solid rgba(255,209,102,.48);border-radius:10px;padding:11px 14px;margin:8px 0;cursor:default;}
    .item-notice-label{font-size:13px;font-weight:850;color:#FFE08A;line-height:1.4;}
    .item-notice-hint{font-size:12px;color:#FFE8B8;padding-top:4px;line-height:1.5;}
    .notice-chips{display:flex;flex-wrap:wrap;gap:6px;}
    .notice-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 8px;border-radius:999px;background:rgba(242,169,59,.1);border:1px solid rgba(242,169,59,.22);color:#FFD58E;font-size:11px;font-weight:800;line-height:1.2;}

    /* LINE BUTTON */
    .line-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:8px 16px;background:#06C755;border-radius:20px;color:#fff;font-size:12px;font-weight:800;text-decoration:none;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 6px 16px rgba(6,199,85,.18);max-width:100%;white-space:normal;}
    .share-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:8px 14px;background:rgba(6,199,85,.12);border:1px solid rgba(6,199,85,.35);border-radius:20px;color:#8EF0B7;font-size:12px;font-weight:800;text-decoration:none;cursor:pointer;-webkit-tap-highlight-color:transparent;max-width:100%;white-space:normal;}
    .share-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .share-file-name{font-size:11px;color:#8EF0B7;line-height:1.4;width:100%;}
    .line-preview{margin-top:8px;padding:10px 12px;background:var(--surface2);border-radius:12px;}
    .line-preview-name{font-size:10px;color:var(--text2);margin-bottom:5px;}
    .line-preview-bubble{display:inline-block;background:#06C755;color:#fff;font-size:13px;line-height:1.55;padding:9px 13px;border-radius:14px 14px 3px 14px;max-width:90%;}

    /* SECTION LABEL (within simple list) */
    .item-section-label{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;padding:14px 0 6px;border-top:1px solid var(--border);margin-top:8px;}

    /* REFERENCE SECTION */
    .notes-card .card-body{padding:0 12px 14px;}
    .notes-card .item-section-label{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.24);border-radius:10px;color:#BFDBFE;margin:12px 0 8px;padding:9px 11px;font-size:13px;letter-spacing:0;}
    .notes-card .item{background:linear-gradient(180deg,rgba(255,255,255,.105),rgba(255,255,255,.065));border:1px solid rgba(255,255,255,.18);border-radius:10px;margin:7px 0;padding:11px 12px;gap:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06);}
    .notes-card .item.safe-info{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.18);}
    .notes-card .cb{width:28px;height:28px;border-radius:8px;margin-top:0;border-width:1px;}
    .notes-card .item-label{font-size:13.5px;line-height:1.65;}
    .notes-card .item-hint{margin-top:6px;padding:7px 9px;background:rgba(245,158,11,.1);border-radius:8px;color:#FBBF24;line-height:1.55;}
    .notes-card .safe-info .item-hint{background:rgba(34,197,94,.1);color:#86EFAC;}
    .safe-badge{display:inline-flex;align-items:center;margin-left:6px;padding:2px 7px;border-radius:999px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.28);color:#A7F3D0;font-size:10px;font-weight:900;vertical-align:middle;white-space:nowrap;}
    .attention-badge{display:inline-flex;align-items:center;margin-left:6px;padding:2px 7px;border-radius:999px;background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.28);color:#FFD58E;font-size:10px;font-weight:900;vertical-align:middle;white-space:nowrap;}
    .phone-badge{display:inline-flex;align-items:center;margin-left:6px;padding:2px 7px;border-radius:999px;background:rgba(59,130,246,.14);border:1px solid rgba(59,130,246,.28);color:#BFDBFE;font-size:10px;font-weight:900;vertical-align:middle;white-space:nowrap;}

    /* WARN ITEM */
    .item.warn .cb:not(.chk){border-color:var(--orange);background:rgba(245,158,11,.08);}
    .item.warn .item-label:not(.chk){color:var(--orange);font-weight:700;}
    .item.danger{background:rgba(239,68,68,.05);border-radius:8px;margin:2px -8px;padding:9px 8px;}
    .item.danger .cb:not(.chk){border-color:var(--red);background:rgba(239,68,68,.1);}
    .item.danger .item-label:not(.chk){color:var(--red);font-weight:700;}
    .item.punch .cb:not(.chk){border-color:var(--red);background:rgba(239,91,75,.1);}
    .item.punch .item-label:not(.chk){color:#FF7A6E;font-weight:850;}

    /* CHIP GRID */
    .chips{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin:8px 0 4px;max-width:100%;}
    .chip{display:flex;align-items:center;justify-content:center;gap:4px;min-width:0;padding:9px 5px;border-radius:12px;border:1px solid var(--soft-border);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));cursor:default;text-align:center;transition:all .15s;min-height:48px;user-select:none;-webkit-user-select:none;overflow:hidden;}
    .chip-icon{font-size:17px;line-height:1;flex-shrink:0;}
    .chip-text{min-width:0;font-size:10.5px;color:var(--text2);line-height:1.25;word-break:break-word;overflow-wrap:anywhere;text-align:center;white-space:pre-line;}

    .modal-footer{padding:12px 16px;border-top:1px solid var(--border);}

    .alarm-guide-title{font-size:16px;font-weight:900;color:#FFD2CC;line-height:1.45;}

    .alarm-action{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:var(--surface2);color:var(--text);font-size:13px;font-weight:900;cursor:pointer;}

    .patrol-tabs{display:flex;gap:6px;margin-bottom:14px;}
    .patrol-tab{flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}

    .patrol-tab.active.維持{background:var(--surface2);border-color:var(--text2);color:var(--text);}
    .patrol-tab.active.解錠{background:var(--green);border-color:var(--green);color:#fff;}

    /* NOTE MODAL */
    .note-area{width:100%;min-height:120px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;padding:12px;resize:none;font-family:inherit;outline:none;-webkit-appearance:none;}
    .note-label{font-size:13px;color:var(--text2);margin-bottom:8px;display:block;}
    .note-item-name{font-size:15px;font-weight:600;margin-bottom:12px;}

    /* PATROL DIVIDER */
    .p-div{font-size:13px;font-weight:850;color:#F3EAD8;padding:12px 0 6px;border-top:2px solid var(--border);}
    .p-div-note{display:block;margin-top:6px;color:#F5C76D;font-size:11px;font-weight:650;line-height:1.45;max-width:100%;overflow-wrap:anywhere;}
    .p-mini-step{display:inline-flex;align-items:center;max-width:100%;margin:2px 3px 2px 0;padding:3px 7px;border-radius:999px;background:rgba(242,169,59,.09);border:1px solid rgba(242,169,59,.16);white-space:normal;overflow-wrap:anywhere;}
    .p-mini-step.punch-step{background:rgba(239,91,75,.12);border-color:rgba(239,91,75,.28);color:#FF8A7F;font-weight:850;}
    .p-mini-arrow{display:inline-flex;color:#8FE3B2;font-weight:900;margin:0 3px;}
    .p-div:first-child{border-top:none;padding-top:4px;}
    .p-guide{margin:3px 0 8px;padding:8px 10px;border-radius:10px;background:rgba(242,169,59,.08);border:1px solid rgba(242,169,59,.18);color:#F5C76D;font-size:11.5px;line-height:1.55;}
    .p-guide-line{display:flex;align-items:flex-start;gap:6px;padding:2px 0;}
    .p-guide-icon{font-size:12px;line-height:1.4;flex-shrink:0;}
    .p-car{font-size:12px;color:var(--text2);padding:8px 0;text-align:center;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);margin:6px 0;}
    .p-note{font-size:12px;color:var(--orange);padding:4px 0 8px;line-height:1.4;}

    /* TOAST */
    .toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:400;transition:transform .3s;white-space:nowrap;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);}

    @media (max-width:380px){
      .hdr{gap:4px;padding-left:6px;padding-right:6px;}
      .hdr-title{font-size:13px;max-width:96px;}
      .hdr-date{display:none;}
      .hdr-btn{font-size:10px;padding:6px 7px;}
      .overview-title{font-size:18px;}
      .overview-ring{width:56px;height:56px;}
      .overview-ring span{width:43px;height:43px;font-size:13px;}

      .stat-value{font-size:14px;}
      .card-title{font-size:14px;}
      .main{padding-left:8px;padding-right:8px;}
      .card-body{padding-left:12px;padding-right:12px;}
      .sub-title{font-size:14px;padding:11px 12px;margin-top:16px;}
      .chip{gap:3px;padding:8px 4px;}
      .chip-text{font-size:10px;}
      .card.complete::after{font-size:25px;padding:9px 20px;letter-spacing:4px;}

</head>

<header class="hdr">
  <h1 class="hdr-title">🛡️ 警備チェック</h1>

  <div class="hdr-space"></div>
  <button class="hdr-btn start" onclick="startShift()">⚔️ 勤務開始</button>
  <button class="hdr-btn" id="hdrEditBtn" onclick="toggleEditMode()">✏️ 編集</button>
  <button class="hdr-btn" onclick="confirmFullReset()">↺</button>
</header>

<main class="main" id="mainContent"></main>

<!-- 帰着後チェック Modal -->
<div class="modal" id="kichaModal">
  <div class="modal-bd" onclick="closeModal('kichaModal')"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span class="modal-title">🔄 巡回帰着後チェック</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="kichaProg" style="font-size:13px;color:var(--text2)"></span>
        <button class="modal-close" onclick="closeModal('kichaModal')">✕</button>
      </div>
    </div>
    <div class="modal-body" id="kichaBody"></div>
    <div class="modal-footer">
      <button class="btn btn-sec" style="width:100%;padding:13px;" onclick="resetKicha()">🔄 リセット</button>
    </div>
  </div>
</div>

<!-- 巡回リスト Modal -->
<div class="modal" id="patrolModal">
  <div class="modal-bd" onclick="closeModal('patrolModal')"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span class="modal-title">📋 巡回リスト</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="patrolProg" style="font-size:13px;color:var(--text2)"></span>
        <button class="modal-close" onclick="closeModal('patrolModal')">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="patrol-tabs">
        <button class="patrol-tab 施錠" id="ptab-施錠" onclick="setPatrolPattern('施錠')">🔒 施錠</button>
        <button class="patrol-tab 維持" id="ptab-維持" onclick="setPatrolPattern('維持')">🔵 維持</button>
        <button class="patrol-tab 解錠" id="ptab-解錠" onclick="setPatrolPattern('解錠')">🔓 解錠</button>
      </div>
      <div id="patrolListBody"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sec" style="width:100%;padding:13px;" onclick="resetPatrolList()">🔄 巡回リストをリセット</button>
    </div>
  </div>
</div>

<!-- メモ Modal -->
<div class="modal" id="noteModal">
  <div class="modal-bd" onclick="closeNoteModal()"></div>
  <div class="modal-sheet" style="max-height:70vh;">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span class="modal-title">📝 メモ</span>
      <button class="modal-close" onclick="closeNoteModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="note-item-name" id="noteItemName"></div>
      <span class="note-label">注意事項・メモ（複数行OK）</span>
      <textarea class="note-area" id="noteTextarea" placeholder="1行目のメモ&#10;2行目のメモ&#10;3行目のメモ"></textarea>
    </div>
    <div class="modal-footer" style="display:flex;gap:8px;">
      <button class="btn btn-red" onclick="deleteNote()">削除</button>
      <button class="btn btn-pri" style="flex:2;" onclick="saveNote()">保存</button>
    </div>
  </div>
</div>

<!-- 目覚まし案内 Modal -->
<div class="modal" id="alarmModal">
  <div class="modal-bd" onclick="closeModal('alarmModal')"></div>
  <div class="modal-sheet alarm-sheet" style="max-height:62vh;">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span class="modal-title">⏰ 目覚ましセット</span>
      <button class="modal-close" onclick="closeModal('alarmModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="alarm-guide">
        <div class="alarm-guide-title" id="alarmGuideTitle"></div>
        <input class="alarm-guide-time" id="alarmGuideTime" type="time" onchange="updateAlarmTimeFromPicker()">
        <div class="alarm-time-caption">タップして時刻変更</div>
        <div class="alarm-guide-text" id="alarmGuideText">時刻をコピーしました。時計アプリでアラームを追加し、時刻欄へ貼り付けてください。</div>
        <div class="alarm-guide-actions">
          <button class="alarm-action primary" id="alarmShortcutBtn" onclick="runAlarmShortcut()">ショートカットで作成</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn alarm-close-btn" style="width:100%;padding:13px;" onclick="closeModal('alarmModal')">セットしたので閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// STATE
// ═══════════════════════════════════════

let S = {sections:[],patrol:[],patrolByPattern:{},patrolNotes:{},patrolPattern:'',kicha:[],alarms:{},alarmTimes:{}};
let noteTarget = null;
let editMode = false;
let dragItemId = null;
let pointerDragItemId = null;
let shareFiles = {};
let currentAlarmSection = null;
const PITCH_STEPS = ['受話器をあげる','不在転送を押す','「307」をダイヤル','「完了」を確認'];
const FAX_STEPS = ['受話器をあげる','転送ボタンを押す','「280」をダイヤル','「完了」を確認'];

function loadState(){
  try{
    const raw = localStorage.getItem('keibi_v5');
    if(raw){ S = JSON.parse(raw); migrate(); }
    else initDefault();
  }catch(e){ initDefault(); }
}

function migrate(){
  if(!S.kicha) S.kicha = DEFAULT_KICHA.map(i=>({...i,checked:false}));
  if(!S.patrolNotes) S.patrolNotes = {};
  if(S.patrolPattern===undefined) S.patrolPattern = '';
  if(!S.alarms) S.alarms = {};
  if(!S.alarmTimes) S.alarmTimes = {};
  if(!S.sections) initDefault();
  S.kicha = syncDefaultList(S.kicha, DEFAULT_KICHA);
  S.patrol = syncDefaultList(S.patrol, DEFAULT_PATROL);
  S.patrolByPattern = syncPatrolPatterns(S.patrolByPattern, S.patrol);
  patchKnownContent();
}

function initDefault(){
  S.patrol = DEFAULT_PATROL.map(i=>({...i}));
  S.patrolByPattern = syncPatrolPatterns({}, S.patrol);
  S.patrolNotes = {};
  S.patrolPattern = '';
  S.alarms = {};
  S.alarmTimes = {};
  S.kicha = DEFAULT_KICHA.map(i=>({...i,checked:false}));
  S.sections = DEFAULT_SECTIONS.map(deepClone);
  addChecked(S.sections);
}

function syncDefaultList(current, defaults){
  const oldById = new Map((current||[]).map(i=>[i.id,i]));
  return defaults.map(def=>{
    const old = oldById.get(def.id) || {};
    return {...def, checked: old.checked ?? false};
  });
}

function syncPatrolPatterns(current, fallback){
  const source = current || {};
  return Object.fromEntries(Object.entries(DEFAULT_PATROLS).map(([name, defaults])=>[
    name,
    syncDefaultList(source[name] || fallback || [], defaults)
  ]));
}

function patchKnownContent(){
  syncSectionFromDefault('notes');
  ['patrol1','patrol2','patrol3','patrol4','patrol5'].forEach(syncSimpleSectionFromDefault);
  syncPatternSectionFromDefault('patrol6');
  syncSectionFromDefault('final');
  applyTransferSteps();
}

function syncSectionFromDefault(sectionId){
  const current = S.sections.find(s=>s.id===sectionId);
  const defaults = DEFAULT_SECTIONS.find(s=>s.id===sectionId);
  if(!current || !defaults || !defaults.items) return;
  current.items = syncDefaultList(current.items, defaults.items);
}

function patchSectionFromDefault(sectionId){
  const current = S.sections.find(s=>s.id===sectionId);
  const defaults = DEFAULT_SECTIONS.find(s=>s.id===sectionId);
  if(!current || !defaults) return;
  patchSubsections(current.subsections, defaults.subsections);
  ['holiday','weekday'].forEach(p=>{
    if(current[p]&&defaults[p]) patchSubsections(current[p].subsections, defaults[p].subsections);
  });
}

function syncSimpleSectionFromDefault(sectionId){
  const current = S.sections.find(s=>s.id===sectionId);
  const defaults = DEFAULT_SECTIONS.find(s=>s.id===sectionId);
  if(!current || !defaults) return;
  ['icon','title','time','type','hasPatrolList'].forEach(k=>{
    if(defaults[k]!==undefined) current[k]=defaults[k];
    else delete current[k];
  });
  if(defaults.alarmTime!==undefined) current.alarmTime=defaults.alarmTime;
  else delete current.alarmTime;
  delete current.holiday;
  delete current.weekday;
  delete current.selectedPattern;
  if(defaults.subsections) current.subsections = syncSubsections(current.subsections, defaults.subsections);
  if(defaults.items) current.items = syncDefaultList(current.items, defaults.items);
}

function syncPatternSectionFromDefault(sectionId){
  const current = S.sections.find(s=>s.id===sectionId);
  const defaults = DEFAULT_SECTIONS.find(s=>s.id===sectionId);
  if(!current || !defaults) return;
  if(defaults.alarmTime!==undefined) current.alarmTime=defaults.alarmTime;
  else delete current.alarmTime;
  ['holiday','weekday'].forEach(p=>{
    if(current[p] && defaults[p]){
      current[p].subsections = syncSubsections(current[p].subsections, defaults[p].subsections);
    }
  });
}

function syncSubsections(currentSubs, defaultSubs){
  const oldById = new Map((currentSubs||[]).map(s=>[s.id,s]));
  return (defaultSubs||[]).map(def=>{
    const old = oldById.get(def.id) || {};
    return {
      ...def,
      items: syncDefaultList(old.items, def.items||[])
    };
  });
}

function patchSubsections(currentSubs, defaultSubs){
  if(!currentSubs||!defaultSubs) return;
  const defaultsById = new Map(defaultSubs.map(s=>[s.id,s]));
  currentSubs.forEach(sub=>{
    const def = defaultsById.get(sub.id);
    if(!def) return;
    sub.title = def.title;
    sub.hasPatrolList = def.hasPatrolList;
    if(def.grid) sub.items = syncDefaultList(sub.items, def.items);
    else patchItems(sub.items, def.items);
  });
}

function patchItems(currentItems, defaultItems){
  if(!currentItems||!defaultItems) return;
  const defaultsById = new Map(defaultItems.map(i=>[i.id,i]));
  currentItems.forEach(item=>{
    const def = defaultsById.get(item.id);
    if(!def) return;
    ['text','icon','hint','lineMsg','sharePhoto','danger','warn','safe','rare','equipment','tag','chips'].forEach(k=>{
      if(def[k]!==undefined) item[k]=def[k];
      else delete item[k];
    });
  });
}

function applyTransferSteps(){
  S.sections.forEach(sec=>{
    const groups=[sec.items,sec.subsections?.flatMap(s=>s.items||[]),sec.holiday?.subsections?.flatMap(s=>s.items||[]),sec.weekday?.subsections?.flatMap(s=>s.items||[])];
    groups.flat().filter(Boolean).forEach(item=>{
      if(item.text==='ピッチ転送') item.steps=PITCH_STEPS;
      if(item.text==='FAX転送') item.steps=FAX_STEPS;
    });
  });
}

function deepClone(s){
  const cloneSub=sub=>({...sub,items:(sub.items||[]).map(i=>({...i,checked:false}))});
  const n={...s};
  if(s.items) n.items=s.items.map(i=>({...i,checked:false}));
  if(s.subsections) n.subsections=s.subsections.map(cloneSub);
  if(s.holiday){
    n.holiday={...s.holiday};
    if(s.holiday.subsections) n.holiday.subsections=s.holiday.subsections.map(cloneSub);
    if(s.holiday.items) n.holiday.items=s.holiday.items.map(i=>({...i,checked:false}));
  }
  if(s.weekday){
    n.weekday={...s.weekday};
    if(s.weekday.items) n.weekday.items=s.weekday.items.map(i=>({...i,checked:false}));
    if(s.weekday.subsections) n.weekday.subsections=s.weekday.subsections.map(cloneSub);
  }
  return n;
}

function addChecked(sections){
  sections.forEach(s=>{
    const ck=arr=>{if(arr)arr.forEach(i=>{if(i.checked===undefined)i.checked=false;});};
    ck(s.items);
    s.subsections?.forEach(sub=>ck(sub.items));
    ck(s.holiday?.items); ck(s.weekday?.items);
    s.holiday?.subsections?.forEach(sub=>ck(sub.items));
    s.weekday?.subsections?.forEach(sub=>ck(sub.items));
  });
}

function save(){ localStorage.setItem('keibi_v5',JSON.stringify(S)); }

function allItems(sec){
  const filter=arr=>(arr||[]).filter(i=>i.type!=='notice'&&i.type!=='label');
  if(sec.type==='simple'){
    if(sec.subsections) return sec.subsections.flatMap(sub=>sub.grid?[]:filter(sub.items||[]));
    return filter(sec.items||[]);
  }
  const p=sec[sec.selectedPattern||'holiday'];
  if(!p) return [];
  if(p.subsections) return p.subsections.flatMap(s=>s.grid?[]:filter(s.items||[]));
  return filter(p.items||[]);
}

function progress(sec){
  const items=allItems(sec);
  return {done:items.filter(i=>i.checked).length,total:items.length};
}

function currentPatrolList(){
  return S.patrolByPattern?.[S.patrolPattern || '施錠'] || S.patrol || [];
}

function patrolItems(){ return currentPatrolList().filter(i=>!i.type); }
function patrolProgress(){
  const items=patrolItems();
  return {done:items.filter(i=>i.checked).length,total:items.length};
}

function kichaProgress(){
  return {done:S.kicha.filter(i=>i.checked).length,total:S.kicha.length};
}

function uid(){ return 'i'+Date.now()+Math.random().toString(36).slice(2,6); }

function render(){
  document.getElementById('hdrDate').textContent=dateStr();
  document.getElementById('mainContent').innerHTML=renderOverview()+S.sections.map(renderCard).join('');
  const btn=document.getElementById('hdrEditBtn');
  btn.textContent=editMode?'✅ 完了':'✏️ 編集';
  btn.className=editMode?'hdr-btn edit-on':'hdr-btn';
  save();
}

function dateStr(){
  const d=new Date(),days=['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
}

function renderOverview(){
  const sectionTotals=S.sections.reduce((acc,sec)=>{
    const p=progress(sec);
    acc.done+=p.done;acc.total+=p.total;
    return acc;
  },{done:0,total:0});
  const patrol=patrolProgress();
  const pct=sectionTotals.total?Math.round(sectionTotals.done/sectionTotals.total*100):0;
  const allDone=sectionTotals.total>0 && sectionTotals.done===sectionTotals.total;
  const remaining=Math.max(sectionTotals.total-sectionTotals.done,0);
  return `
    <section class="overview${allDone?' complete':''}" style="--pct:${pct}%">
      <div class="overview-top">
        <div>
          <div class="overview-kicker">${allDone?'MISSION COMPLETE':'TODAY CHECK'}</div>
          <div class="overview-title">${allDone?'本日の警備任務、完了':'今日の警備チェック'}</div>
          <div class="overview-sub">${allDone?'必要な確認項目はすべて完了しています。':'必要な作業を上から順に確認できます。迷ったら確認事項を開いてください。'}</div>
          <div class="overview-complete-badge">任務完了。帰る前の最終確認まで終わっています。</div>
        </div>
        <div class="overview-ring"><span>${pct}%</span></div>
      </div>
      <div class="overview-stats">
        <div class="stat"><div class="stat-label">全体</div><div class="stat-value">${sectionTotals.done}/${sectionTotals.total}</div></div>
        <div class="stat"><div class="stat-label">残り</div><div class="stat-value">${remaining}</div></div>
      </div>
    </section>`;
}

function renderCard(sec){
  const {done,total}=progress(sec);
  const pct=total>0?Math.round(done/total*100):0;
  const isDone=total>0&&done===total;
  return `
    <div class="card${isDone?' complete':''}${sec.expanded?' expanded':''}${sec.id==='notes'?' notes-card':''}" id="card-${sec.id}">
      <div class="card-hdr" onclick="toggleCard('${sec.id}')">
        <span class="card-icon">${sec.icon}</span>
        <div class="card-info">
          <div class="card-title">${sec.title}</div>
          <div class="card-time">${sec.time}</div>
        </div>
        <div class="card-right">
          ${renderAlarmControl(sec)}
          <span class="card-prog${isDone?' done':''}">${done}/${total}</span>
          <span class="chevron${sec.expanded?' open':''}">▾</span>
        </div>
      </div>
      <div class="pbar-wrap"><div class="pbar${isDone?' done':''}" style="width:${pct}%"></div></div>
      <div class="card-body${sec.expanded?' open':''}">
        ${renderBody(sec)}
      </div>
    </div>`;
}

function renderAlarmControl(sec){
  const alarmTime=getAlarmTime(sec);
  if(!alarmTime) return '';
  const isSet=!!S.alarms?.[sec.id];
  return `<button class="alarm-pill${isSet?' set':''}" title="${sec.title} ${alarmTime}" onclick="toggleAlarm('${sec.id}');event.stopPropagation()">⏰ <span>${isSet?'✓ ':''}${alarmTime}</span></button>`;
}

function getAlarmTime(sec){
  return S.alarmTimes?.[sec.id] || sec.alarmTime || '';
}

function renderSubs(subs,secId,sectionComplete=false){
  return subs.map(sub=>`
    <div class="sub${isSubComplete(sub,sectionComplete)?' stamp-complete':''}${subClass(sub)}">
      ${sub.title?`<div class="sub-title">${sub.title}</div>`:''}
      ${sub.grid
        ?`<div class="chips">${(sub.items||[]).map(i=>renderItem(i,secId,true)).join('')}</div>`
        :(sub.items||[]).map(i=>renderItem(i,secId)).join('')}
      ${sub.hasPatrolList?`<button class="patrol-btn" onclick="openPatrolModal();event.stopPropagation()">📋 巡回リストを開く →</button>`:''}
      ${sub.hint?`<div class="sub-help">${sub.hint}</div>`:''}
    </div>`).join('');
}

function subClass(sub){
  if(!sub.title) return '';
  if(sub.title.includes('最優先')) return ' priority-urgent';
  if(sub.title.includes('記入・整理')) return ' priority-docs';
  if(sub.title.includes('提出・報告')) return ' priority-report';
  return '';
}

function isSubComplete(sub,sectionComplete=false){
  if(!sub.completeStamp || sectionComplete) return false;
  const items=(sub.items||[]).filter(i=>i.type!=='notice'&&i.type!=='label');
  return items.length>0 && items.every(i=>i.checked);
}

function renderBody(sec){
  let h='';
  const sectionComplete=progress(sec).total>0 && progress(sec).done===progress(sec).total;
  if(sec.type==='pattern'){
    const pat=sec.selectedPattern||'holiday';
    h+=`<div class="tabs">
      <button class="tab${pat==='weekday'?' active':''}" onclick="setPat('${sec.id}','weekday');event.stopPropagation()">💼 平日</button>
      <button class="tab${pat==='holiday'?' active':''}" onclick="setPat('${sec.id}','holiday');event.stopPropagation()">🗓 休日</button>
    </div>`;
    const pData=sec[pat];
    if(pData){
      if(pData.subsections){
        h+=renderSubs(pData.subsections,sec.id,sectionComplete);
      } else if(pData.items){
        h+=pData.items.map(i=>renderItem(i,sec.id)).join('');
      }
      if(pData.hasPatrolList) h+=`<button class="patrol-btn" onclick="openPatrolModal();event.stopPropagation()">📋 巡回リストを開く →</button>`;
    }
  } else {
    if(sec.subsections){
      h+=renderSubs(sec.subsections,sec.id,sectionComplete);
    } else {
      h+=(sec.items||[]).map(i=>renderItem(i,sec.id)).join('');
      if(sec.hasPatrolList) h+=`<button class="patrol-btn" onclick="openPatrolModal();event.stopPropagation()">📋 巡回リストを開く →</button>`;
    }
  }
  h+=`<div class="actions">
    <button class="btn btn-close" onclick="closeSection('${sec.id}');event.stopPropagation()">▲ 閉じる</button>
    <button class="btn btn-sec" onclick="resetSection('${sec.id}');event.stopPropagation()">🔄 リセット</button>
    ${editMode?`<button class="btn btn-pri" onclick="addItem('${sec.id}');event.stopPropagation()">＋ 追加</button>`:''}
  </div>`;
  return h;
}

function renderItem(item,sectionId='',isChip=false){
  if(isChip){
    return `<div class="chip${item.rare?' rare':''}${(item.equipment||item.text.includes('（装備品）'))?' equipment':''}">
      <div class="chip-icon">${iconHtml(item.icon||'📦')}</div>
      <div class="chip-text">${formatChipText(item.text)}${item.equipment?'<span class="chip-sub">装備品</span>':''}</div>
    </div>`;
  }
  if(item.type==='label'){
    return `<div class="item-section-label">${item.text}</div>`;
  }
  if(item.type==='notice'){
    return `<div class="item-notice">
      <div class="item-notice-label">${item.icon?iconHtml(item.icon)+' ':''}${item.text}</div>
      ${item.chips?`<div class="notice-chips">${item.chips.map(c=>`<span class="notice-chip">${c}</span>`).join('')}</div>`:''}
      ${item.hint?item.hint.split('\n').map(h=>`<div class="item-notice-hint">💬 ${h}</div>`).join(''):''}
    </div>`;
  }
  const del=editMode&&sectionId
    ?`<button class="item-del" onclick="deleteItem('${item.id}','${sectionId}');event.stopPropagation()">×</button>`
    :'';
  const drag=editMode&&sectionId
    ?`draggable="true" data-item-id="${item.id}" ondragstart="dragStart(event,'${item.id}')" ondragover="dragOver(event)" ondrop="dropItem(event,'${item.id}')" ondragend="dragEnd()" onpointerup="pointerDrop(event,'${item.id}')"`
    :'';
  const handle=editMode&&sectionId
    ?`<button class="drag-handle" onpointerdown="pointerDragStart(event,'${item.id}')" onclick="event.stopPropagation()" aria-label="並び替え">⋮⋮</button>`
    :'';
  const punch=isPunchItem(item)?' punch':'';
  const safe=item.safe?' safe-info':'';
  const safeBadge=item.safe?'<span class="safe-badge">対応不要</span>':'';
  const tagBadge=item.tag==='要注意'?'<span class="attention-badge">要注意</span>':item.tag==='電話のみ'?'<span class="phone-badge">電話のみ</span>':'';
  return `
    <div class="item${item.warn?' warn':''}${item.danger?' danger':''}${punch}${safe}" ${drag} onclick="toggle('${item.id}')">
      ${handle}
      <div class="cb${item.checked?' chk':''}"></div>
      <div class="item-main">
        <span class="item-label${item.checked?' chk':''}">${item.icon?iconHtml(item.icon)+' ':''}${item.text}${safeBadge}${tagBadge}</span>
        ${renderHint(item)}
        ${item.lineMsg?`<a class="line-btn" href="line://msg/text/${encodeURIComponent(item.lineMsg)}" onclick="event.stopPropagation()">文章をLINEで送る</a>`:''}
        ${item.sharePhoto?renderPhotoShareControls(item):''}
      </div>
      ${del}
    </div>`;
}

function renderPhotoShareControls(item){
  const picked=shareFiles[item.id]?.name || '';
  return `<div class="share-row" onclick="event.stopPropagation()">
    <label class="share-btn">
      写真を選ぶ
      <input type="file" accept="image/*" style="display:none" onchange="selectSharePhoto(event,'${item.id}')">
    </label>
    <button class="share-btn" onclick="shareSelectedPhoto('${item.id}');event.stopPropagation()">選んだ写真を共有</button>
    <div class="share-file-name" id="share-name-${item.id}">${picked?`選択中：${picked}`:'先に写真を選んでください。文章は共有時にコピーします。'}</div>
  </div>`;
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════

function toggleEditMode(){
  editMode=!editMode;
  render();
  toast(editMode?'編集モードON':'保存しました');
}

function toggleCard(id){
  const s=S.sections.find(x=>x.id===id);
  if(s){s.expanded=!s.expanded;render();}
}

function setPat(id,pat){
  const s=S.sections.find(x=>x.id===id);
  if(s){s.selectedPattern=pat;render();}
}

function toggleAlarm(id){
  const s=S.sections.find(x=>x.id===id);
  const alarmTime=s ? getAlarmTime(s) : '';
  if(!alarmTime) return;
  if(!S.alarms) S.alarms = {};
  if(S.alarms[id]){
    delete S.alarms[id];
    render();
    toast(`${s.title}の目覚ましを解除しました`);
  }else{
    S.alarms[id] = {time:alarmTime,setAt:new Date().toISOString()};
    render();
    openAlarmGuide(s);
  }
}

function openAlarmGuide(sec){
  currentAlarmSection = sec;
  const alarmTime=getAlarmTime(sec);
  document.getElementById('alarmGuideTitle').textContent=`${sec.title}の目覚まし`;
  document.getElementById('alarmGuideTime').value=toTimeInputValue(alarmTime);
  document.getElementById('alarmGuideText').textContent='時刻をコピーしました。ショートカットで新しいアラームを作成します。時刻を変える場合は、上の時刻をタップしてください。';
  copyText(alarmTime);
  openModal('alarmModal');
}

function copyAlarmTime(){
  if(!currentAlarmSection) return;
  const alarmTime=getAlarmTime(currentAlarmSection);
  copyText(alarmTime);
  toast(`${alarmTime} をコピーしました`);
}

function copyText(text){
  try{
    if(navigator.clipboard?.writeText){
      navigator.clipboard.writeText(text);
      return;
    }
  }catch(e){}
  try{
    const ta=document.createElement('textarea');
    ta.value=text;
    ta.setAttribute('readonly','');
    ta.style.position='fixed';
    ta.style.left='-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }catch(e){}
}

function runAlarmShortcut(){
  if(!currentAlarmSection) return;
  const alarmTime=getAlarmTime(currentAlarmSection);
  copyText(alarmTime);
  const text=encodeURIComponent(alarmTime);
  location.href=`shortcuts://run-shortcut?name=${encodeURIComponent('警備アラーム')}&input=text&text=${text}`;
}

function updateAlarmTimeFromPicker(){
  if(!currentAlarmSection) return;
  const next=document.getElementById('alarmGuideTime').value;
  const normalized=normalizeAlarmTime(next);
  if(!normalized){
    toast('時刻を選び直してください');
    return;
  }
  if(!S.alarmTimes) S.alarmTimes = {};
  S.alarmTimes[currentAlarmSection.id]=normalized;
  if(S.alarms?.[currentAlarmSection.id]) S.alarms[currentAlarmSection.id].time=normalized;
  render();
  openAlarmGuide(currentAlarmSection);
  toast(`${normalized} に変更しました`);
}

function editAlarmTime(){
  const input=document.getElementById('alarmGuideTime');
  if(!input) return;
  if(input.showPicker) input.showPicker();
  else input.focus();
}

function normalizeAlarmTime(value){
  const s=String(value).trim().replace(/[：．。]/g,':');
  const m=s.match(/^(\d{1,2}):(\d{1,2})$/);
  if(!m) return '';
  const h=Number(m[1]), min=Number(m[2]);
  if(!Number.isInteger(h) || !Number.isInteger(min) || h<0 || h>23 || min<0 || min>59) return '';
  return `${h}:${String(min).padStart(2,'0')}`;
}

function toTimeInputValue(value){
  const normalized=normalizeAlarmTime(value);
  if(!normalized) return '';
  const [h,m]=normalized.split(':');
  return `${String(Number(h)).padStart(2,'0')}:${m}`;
}

function closeSection(id){
  const s=S.sections.find(x=>x.id===id);
  if(s){s.expanded=false;render();}
}

function findItem(id){
  for(const s of S.sections){
    for(const arr of [s.items,s.holiday?.items,s.weekday?.items]){
      if(arr){const i=arr.find(x=>x.id===id);if(i)return i;}
    }
    const allSubs=[...(s.subsections||[]),...(s.holiday?.subsections||[]),...(s.weekday?.subsections||[])];
    for(const sub of allSubs){const i=sub.items?.find(x=>x.id===id);if(i)return i;}
  }
  return null;
}

function findItemArray(id){
  for(const s of S.sections){
    for(const arr of [s.items,s.holiday?.items,s.weekday?.items]){
      if(arr?.some(x=>x.id===id)) return arr;
    }
    const allSubs=[...(s.subsections||[]),...(s.holiday?.subsections||[]),...(s.weekday?.subsections||[])];
    for(const sub of allSubs){
      if(sub.items?.some(x=>x.id===id)) return sub.items;
    }
  }
  return null;
}

function dragStart(event,id){
  if(!editMode) return;
  dragItemId=id;
  event.dataTransfer?.setData('text/plain',id);
  event.currentTarget.classList.add('dragging');
}

function dragOver(event){
  if(editMode && dragItemId) event.preventDefault();
}

function dropItem(event,targetId){
  if(!editMode) return;
  event.preventDefault();
  moveItem(dragItemId,targetId);
  dragEnd();
}

function dragEnd(){
  dragItemId=null;
  document.querySelectorAll('.item.dragging').forEach(el=>el.classList.remove('dragging'));
}

function pointerDragStart(event,id){
  if(!editMode) return;
  pointerDragItemId=id;
  dragItemId=id;
  event.currentTarget.closest('.item')?.classList.add('dragging');
  event.preventDefault();
  event.stopPropagation();
}

function pointerDrop(event,targetId){
  if(!editMode || !pointerDragItemId) return;
  event.preventDefault();
  event.stopPropagation();
  moveItem(pointerDragItemId,targetId);
  pointerDragItemId=null;
  dragEnd();
}

function moveItem(fromId,toId){
  if(!fromId || !toId || fromId===toId) return;
  const fromArr=findItemArray(fromId);
  const toArr=findItemArray(toId);
  if(!fromArr || fromArr!==toArr){
    toast('同じグループ内で移動できます');
    return;
  }
  const fromIdx=fromArr.findIndex(i=>i.id===fromId);
  const toIdx=fromArr.findIndex(i=>i.id===toId);
  if(fromIdx<0 || toIdx<0) return;
  const [moved]=fromArr.splice(fromIdx,1);
  fromArr.splice(toIdx,0,moved);
  render();
  toast('並び替えました');
}

function toggle(id){
  if(dragItemId || pointerDragItemId) return;
  const i=findItem(id);
  if(i){i.checked=!i.checked;render();}
}

function selectSharePhoto(event,itemId){
  const file=event.target.files?.[0];
  if(!file) return;
  shareFiles[itemId]=file;
  const label=document.getElementById(`share-name-${itemId}`);
  if(label) label.textContent=`選択中：${file.name}`;
  toast('写真を選びました');
}

async function shareSelectedPhoto(itemId){
  const item=findItem(itemId);
  const message=item?.lineMsg || '';
  const file=shareFiles[itemId];
  if(!file){
    toast('先に写真を選んでください');
    return;
  }
  try{ await navigator.clipboard?.writeText(message); }catch(e){}
  try{
    if(navigator.share && (!navigator.canShare || navigator.canShare({files:[file]}))){
      await navigator.share({files:[file],text:message,title:'下番報告'});
      toast('文章はコピー済みです');
      return;
    }
  }catch(e){
    toast('共有を中止しました');
    return;
  }
  toast('このiPhoneでは写真共有できません。文章はコピー済みです');
  location.href=`line://msg/text/${encodeURIComponent(message)}`;
}

function resetSection(id){
  const s=S.sections.find(x=>x.id===id);
  if(!s)return;
  [s.items,s.holiday?.items,s.weekday?.items].forEach(arr=>arr?.forEach(i=>i.checked=false));
  [...(s.subsections||[]),...(s.holiday?.subsections||[]),...(s.weekday?.subsections||[])].forEach(sub=>sub.items?.forEach(i=>i.checked=false));
  render();toast('リセットしました');
}

function startShift(){
  if(!confirm('すべてのチェックを外して、今日の勤務を開始しますか？\n手順やメモは残ります。')) return;
  uncheckAllItems();
  editMode=false;
  render();
  toast('勤務開始。チェックを外しました');
}

function uncheckAllItems(){
  S.sections.forEach(s=>{
    [s.items,s.holiday?.items,s.weekday?.items].forEach(arr=>arr?.forEach(i=>i.checked=false));
    [...(s.subsections||[]),...(s.holiday?.subsections||[]),...(s.weekday?.subsections||[])].forEach(sub=>sub.items?.forEach(i=>i.checked=false));
  });
  S.kicha?.forEach(i=>i.checked=false);
  S.patrol?.forEach(i=>{if(i.checked!==undefined)i.checked=false;});
  Object.values(S.patrolByPattern||{}).forEach(list=>list.forEach(i=>{if(i.checked!==undefined)i.checked=false;}));
  S.patrolPattern='';
  S.alarms={};
}

function addItem(sectionId){
  const text=prompt('追加する項目：');
  if(!text||!text.trim())return;
  const s=S.sections.find(x=>x.id===sectionId);
  if(!s)return;
  const item={id:uid(),text:text.trim(),checked:false};
  if(s.type==='pattern'){
    const p=s[s.selectedPattern||'holiday'];
    if(p?.subsections) p.subsections[p.subsections.length-1].items.push(item);
    else if(p?.items) p.items.push(item);
  } else {
    if(s.subsections) s.subsections[s.subsections.length-1].items.push(item);
    else{if(!s.items)s.items=[];s.items.push(item);}
  }
  render();toast('追加しました');
}

function deleteItem(itemId,sectionId){
  const s=S.sections.find(x=>x.id===sectionId);
  if(!s)return;
  const rm=arr=>{if(arr){const idx=arr.findIndex(i=>i.id===itemId);if(idx>-1)arr.splice(idx,1);}};
  rm(s.items);rm(s.holiday?.items);rm(s.weekday?.items);
  [...(s.subsections||[]),...(s.holiday?.subsections||[]),...(s.weekday?.subsections||[])].forEach(sub=>rm(sub.items));
  render();toast('削除しました');
}

function confirmFullReset(){
  if(confirm('全セクションとフォームをリセットします。よろしいですか？')){
    editMode=false;initDefault();render();toast('全リセット完了');
  }
}

// KICHA MODAL
// ═══════════════════════════════════════

function openKichaModal(){renderKicha();openModal('kichaModal');}

function renderKicha(){
  const {done,total}=kichaProgress();
  document.getElementById('kichaProg').textContent=`${done}/${total}`;
  document.getElementById('kichaBody').innerHTML=S.kicha.map(item=>`
    <div class="item${item.warn?' warn':''}${item.danger?' danger':''}" onclick="toggleKicha('${item.id}')">
      <div class="cb${item.checked?' chk':''}"></div>
      <div class="item-main"><span class="item-label${item.checked?' chk':''}">${item.icon?iconHtml(item.icon)+' ':''}${item.text}</span></div>
    </div>`).join('');
}

function toggleKicha(id){
  const i=S.kicha.find(x=>x.id===id);
  if(i){i.checked=!i.checked;renderKicha();save();}
}

function resetKicha(){
  S.kicha.forEach(i=>i.checked=false);
  renderKicha();save();toast('リセットしました');
}

// ═══════════════════════════════════════
// PATROL MODAL
// ═══════════════════════════════════════

function openPatrolModal(){
  S.patrolPattern='';
  renderPatrolList();
  openModal('patrolModal');
}

function setPatrolPattern(p){
  S.patrolPattern=p;
  renderPatrolList();save();
}

function renderPatrolList(){
  ['施錠','維持','解錠'].forEach(p=>{
    const el=document.getElementById('ptab-'+p);
    if(el) el.className=`patrol-tab ${p}${S.patrolPattern===p?' active':''}`;
  });
  const {done,total}=patrolProgress();
  document.getElementById('patrolProg').textContent=S.patrolPattern?`${done}/${total}`:'';
  if(!S.patrolPattern){
    document.getElementById('patrolListBody').innerHTML=`<div style="text-align:center;color:var(--text2);padding:40px 0;font-size:14px;">パターンを選択してください</div>`;
    return;
  }
  const patrolList = currentPatrolList();
  document.getElementById('patrolListBody').innerHTML=patrolList.map((item,idx)=>{
      if(item.type==='div'){
      const first=idx===0||patrolList.slice(0,idx).every(x=>x.type);
      return `<div class="p-div"${first?'':''} style="${first?'border-top:none;padding-top:4px;':''}">${item.text}${renderPatrolGuideInline(item.hint)}</div>`;
    }
    if(item.type==='car') return `<div class="p-car">── 🚗 ここから車で移動 ──</div>`;
    if(item.type==='note') return `<div class="p-note">${item.text}</div>`;
    const note=S.patrolNotes[item.id]||'';
    const lines=note?note.split('\n').filter(l=>l.trim()):[];
    const punch=isPunchItem(item)?' punch':'';
    return `
      <div class="item${punch}" onclick="togglePatrol('${item.id}')">
        <div class="cb${item.checked?' chk':''}"></div>
        <span class="item-main"><span class="item-label${item.checked?' chk':''}">${item.text}</span></span>
        <button class="item-note-btn${note?' has-note':''}" onclick="openNote('${item.id}');event.stopPropagation()">${note?'💬':'＋'}</button>
      </div>
      ${renderPatrolGuide(item.hint)}
      ${lines.length?`<div style="padding:0 0 8px 36px;margin-top:-4px;">${lines.map(l=>`<div style="font-size:12px;color:var(--orange);padding:1px 0;">・${l}</div>`).join('')}</div>`:''}
    `;
  }).join('');
}

function isPunchItem(item){
  return /打刻する|打刻 🔑/.test(item?.text||'');
}

function renderPatrolGuide(hint){
  if(!hint) return '';
  return `<div class="p-guide">${hint.split('\n').map(line=>`
    <div class="p-guide-line"><span class="p-guide-icon">💬</span><span>${line}</span></div>
  `).join('')}</div>`;
}

function renderPatrolGuideInline(hint){
  if(!hint) return '';
  const parts = hint.split('|');
  return `<span class="p-div-note">💬 ${parts.map((p,idx)=>`
    ${idx>0?'<span class="p-mini-arrow">→</span>':''}<span class="p-mini-step${isPunchStep(p)?' punch-step':''}">${p}</span>
  `).join('')}</span>`;
}

function isPunchStep(text){
  return /打刻$/.test(text) && !/打刻ドア/.test(text);
}

function renderHint(item){
  if(!item.hint) return '';
  if(item.steps){
    return `<div class="steps">${item.steps.map((s,idx)=>`
      <div class="step"><span class="step-num">${idx+1}</span><span>${s}</span></div>
    `).join('')}</div>`;
  }
  return item.hint.split('\n').map(h=>`<div class="item-hint">💬 ${h}</div>`).join('');
}

function iconHtml(icon){
  if(icon==='u-lock') return '<span class="u-lock-icon" aria-label="ダイヤル式U字ロック"></span>';
  if(icon==='phs') return '<span class="phs-icon" aria-label="PHS"></span>';
  return icon;
}

function formatChipText(text){
  return text.replace('（装備品）','<span class="chip-sub">装備品</span>');
}

function togglePatrol(id){
  const i=currentPatrolList().find(x=>x.id===id);
  if(i){i.checked=!i.checked;renderPatrolList();save();}
}

function resetPatrolList(){
  patrolItems().forEach(i=>i.checked=false);
  renderPatrolList();save();toast('巡回リストをリセットしました');
}

// ═══════════════════════════════════════
// NOTE MODAL
// ═══════════════════════════════════════

function openNote(patrolId){
  noteTarget=patrolId;
  const item=currentPatrolList().find(x=>x.id===patrolId);
  document.getElementById('noteItemName').textContent=item?.text||'';
  document.getElementById('noteTextarea').value=S.patrolNotes[patrolId]||'';
  openModal('noteModal');
  setTimeout(()=>document.getElementById('noteTextarea').focus(),300);
}

function saveNote(){
  if(!noteTarget)return;
  const val=document.getElementById('noteTextarea').value.trim();
  if(val) S.patrolNotes[noteTarget]=val;
  else delete S.patrolNotes[noteTarget];
  closeNoteModal();save();toast('メモを保存しました');
}

function deleteNote(){
  if(!noteTarget)return;
  delete S.patrolNotes[noteTarget];
  closeNoteModal();save();toast('メモを削除しました');
}

function closeNoteModal(){
  closeModal('noteModal');
  noteTarget=null;
  if(document.getElementById('patrolModal').classList.contains('open')) renderPatrolList();
}

// MODAL HELPERS
// ═══════════════════════════════════════

function openModal(id){
  document.getElementById(id).classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
  if(!document.querySelector('.modal.open')) document.body.style.overflow='';
}

// TOAST
// ═══════════════════════════════════════

let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2200);
}
